<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NeuralGraph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #c8c8e8;
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }

  .loader { text-align: center; }

  /* ── Pulsing diamond icon ─────────────────────────────── */
  .icon {
    font-size: 52px;
    color: #4f8ef7;
    margin-bottom: 24px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.12); }
  }

  /* ── Title ────────────────────────────────────────────── */
  .title {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #e0e0ff;
    margin-bottom: 36px;
  }

  /* ── Status text ──────────────────────────────────────── */
  .status {
    font-size: 11px;
    color: #555577;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
    min-height: 16px;
    transition: color 0.3s;
  }
  .status.error { color: #f74f6a; }

  /* ── Progress bar ─────────────────────────────────────── */
  .track {
    width: 220px;
    height: 3px;
    background: #0e0e1a;
    border-radius: 2px;
    overflow: hidden;
    margin: 0 auto;
  }
  .bar {
    height: 100%;
    width: 5%;
    background: linear-gradient(90deg, #4f8ef7, #b44ff7);
    border-radius: 2px;
    transition: width 0.45s ease;
  }

  /* ── Close button (top-right, no-drag) ────────────────── */
  .close-btn {
    position: fixed;
    top: 6px;
    right: 10px;
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: #333;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .close-btn:hover { color: #c0392b; background: rgba(192,57,43,0.12); }
</style>
</head>
<body>

  <button class="close-btn" id="close-btn" title="Quit">&times;</button>

  <div class="loader">
    <div class="icon">&#9670;</div>
    <div class="title">NeuralGraph</div>
    <div class="status" id="status-text">Initializing&hellip;</div>
    <div class="track">
      <div class="bar" id="progress-bar"></div>
    </div>
  </div>

  <script>
    // Called by Electron main process via executeJavaScript
    window.updateLoading = function (text, percent) {
      var st = document.getElementById('status-text');
      var pb = document.getElementById('progress-bar');
      if (st) {
        st.textContent = text;
        if (percent < 0) st.classList.add('error');
        else st.classList.remove('error');
      }
      if (pb && percent >= 0) {
        pb.style.width = Math.min(100, Math.max(0, percent)) + '%';
      }
    };

    // Close button — works with or without electronAPI
    document.getElementById('close-btn').addEventListener('click', function () {
      if (window.electronAPI) window.electronAPI.close();
      else window.close();
    });
  </script>

</body>
</html>
